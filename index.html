<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NCBT – Mock Tests &amp; PYQs for Nursing, Pharmacist &amp; Paramedical Govt Exams</title>
    <meta name="description" content="Prepare smarter with NCBT. Practice free and premium Mock Tests, Previous Year Questions (PYQs), exam-wise practice sets and performance analytics for Nursing, Pharmacist and Paramedical Government Exams including WBHRB, AIIMS NORCET, ESIC, RRB, NHM, DSSSB and more." />
    <meta name="keywords" content="NCBT, National CBT, Nursing Exam Prep, Pharmacist Exam Prep, Paramedical Exam, WBHRB Staff Nurse, AIIMS NORCET, RRB Staff Nurse, ESIC Nursing Officer, DSSSB, NHM, Government Exam CBT, Practice Mock Tests, PYQ" />
    <meta name="author" content="NCBT Editorial" />
    <style>
      html, body {
        background-color: #080c12;
        color: #e6edf3;
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }
      html.light, html.light body {
        background-color: #FBFBF9;
        color: #0f172a;
      }
      #root {
        background-color: #080c12;
        min-height: 100vh;
      }
      html.light #root {
        background-color: #FBFBF9;
      }
    </style>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme') || 'dark';
          if (theme === 'light') {
            document.documentElement.classList.add('light');
          } else {
            document.documentElement.classList.remove('light');
          }
        } catch (e) {}

        // Unregister stale service workers & clear legacy caches on load
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var registration of registrations) {
              registration.unregister();
            }
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (var name of names) {
              caches.delete(name);
            }
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
