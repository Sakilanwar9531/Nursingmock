    <meta property="og:title" content="NCBT – Mock Tests &amp; PYQs for Nursing, Pharmacist &amp; Paramedical Govt Exams" />

    <style>
      html, body {
        background-color: #070c18;
        color: #f8fafc;
        font-family: 'Plus Jakarta Sans', 'Inter', ui-sans-serif, system-ui, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
      }
      html.light, html.light body {
        background-color: #FBFBF9;
        color: #0f172a;
      }
      #root {
        background-color: #070c18;
        min-height: 100vh;
      }
      html.light #root {
        background-color: #FBFBF9;
      }
      .ncbt-app-loader {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background-color: inherit;
      }
      .ncbt-spinner {
        width: 44px;
        height: 44px;
        border: 3px solid rgba(16, 185, 129, 0.15);
        border-top-color: #10b981;
        border-radius: 50%;
        animation: ncbt-spin 0.75s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      .ncbt-brand-text {
        font-weight: 800;
        font-size: 13px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #94a3b8;
        opacity: 0.75;
      }
      html.light .ncbt-brand-text {
        color: #64748b;
      }
      @keyframes ncbt-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme') || 'dark';
          if (theme === 'light') {
            document.documentElement.classList.add('light');
          } else {
            document.documentElement.classList.remove('light');
          }
        } catch (e) {}

        // Unregister stale service workers & clear legacy caches on load
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var registration of registrations) {
              registration.unregister();
            }
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (var name of names) {
              caches.delete(name);
            }
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="ncbt-app-loader">
        <div class="ncbt-spinner"></div>
        <div class="ncbt-brand-text">NCBT</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
